# Render Blueprint 예시 — 저장소 연결 후 Blueprint 로 가져오거나, 수동으로 Web Service 를 만들 때 참고.
# 대시보드에서 Root Directory = backend, Start Command 는 아래와 동일하게 맞추면 됩니다.
services:
  - type: web
    name: worksheet-ops-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
